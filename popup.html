<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ImgtoPrompt</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        width: 320px;
        font-family: "SF Pro Text", "SF Pro Display", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: linear-gradient(170deg, #15181f, #0f131a);
        color: #f7f8fa;
        padding: 16px;
      }
      .brand {
        display: inline-flex;
        align-items: center;
        margin-bottom: 6px;
      }
      .brand img {
        width: 156px;
        max-height: 24px;
        object-fit: contain;
        object-position: left center;
      }
      h1 {
        margin: 8px 0 14px;
        font-size: 22px;
      }
      .panel {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 14px;
        padding: 12px;
        margin-bottom: 10px;
      }
      .panel p {
        margin: 0 0 8px;
        font-size: 13px;
        line-height: 1.5;
      }
      .muted {
        color: rgba(255, 255, 255, 0.68);
      }
      ul {
        margin: 0;
        padding-left: 18px;
      }
      li {
        font-size: 13px;
        line-height: 1.5;
        margin-bottom: 4px;
      }
      code {
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      }
    </style>
  </head>
  <body>
    <div class="brand"><img src="assets/LOGO.png" alt="ImgtoPrompt logo" /></div>
    <h1>Pinterest 图片分析</h1>
    <div class="panel">
      <p><strong>当前模式：</strong><span id="mode"></span></p>
      <p class="muted" id="version"></p>
    </div>
    <div class="panel">
      <p><strong>使用方式</strong></p>
      <ul>
        <li>打开 Pinterest 图片详情页（URL 包含 <code>/pin/</code>）</li>
        <li>在图片上右键，点击 <code>ImgtoPrompt</code></li>
        <li>右侧面板会自动分析并返回 Prompt</li>
      </ul>
    </div>
    <script src="utils/constants.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
